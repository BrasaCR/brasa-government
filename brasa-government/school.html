<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>School · BRASA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F0EBDE;--ink:#1B1A17;--soft:#6B6658;--accent:#8C3A1F;--line:#D9D2C4;--card:#FBF8F1;--serif:'Fraunces',Georgia,serif;--sans:'Geist',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:0 clamp(1.25rem,5vw,2.5rem)}
  header.bar{position:sticky;top:0;z-index:10;background:rgba(240,235,222,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar-row{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;max-width:760px;margin:0 auto;padding-left:clamp(1.25rem,5vw,2.5rem);padding-right:clamp(1.25rem,5vw,2.5rem)}
  .mark{font-family:var(--serif);font-weight:600;font-size:1.3rem;color:var(--accent)}
  .back{font-family:var(--sans);font-size:.85rem;font-weight:500;color:var(--soft);text-decoration:none;cursor:pointer;background:none;border:0}
  .back:hover{color:var(--ink)}
  .lead{padding:clamp(2.25rem,6vw,3.5rem) 0 1.25rem;border-bottom:1px solid var(--line)}
  .eyebrow{font-family:var(--sans);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.7rem}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,4.5vw,2.9rem);line-height:1.06;letter-spacing:-.01em;color:var(--ink)}
  .sub{margin-top:.7rem;color:var(--soft);font-size:1rem}
  .facts{padding:1.6rem 0;border-bottom:1px solid var(--line)}
  .fact{display:flex;gap:1rem;padding:.55rem 0;border-bottom:1px solid var(--line)}
  .fact:last-child{border-bottom:0}
  .fact-k{flex:0 0 38%;font-family:var(--sans);font-size:.7rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);padding-top:.15rem}
  .fact-v{flex:1;font-family:var(--serif);font-size:1.08rem;color:var(--ink)}
  .quote{font-family:var(--serif);font-style:italic;font-weight:300;font-size:1.15rem;line-height:1.4;color:var(--ink);padding:1.6rem 0;border-bottom:1px solid var(--line)}
  .actions{display:flex;flex-wrap:wrap;gap:.8rem;padding:1.6rem 0 0}
  .btn{font-family:var(--sans);font-size:.9rem;font-weight:600;text-decoration:none;border-radius:10px;padding:.7rem 1.1rem;border:1px solid var(--line);cursor:pointer}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-ghost{background:var(--card);color:var(--ink)}
  .btn-soon{background:transparent;color:var(--soft);border-style:dashed;cursor:default}
  /* pay panel */
  .pay{margin-top:1.4rem;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.3rem 1.3rem 1.4rem}
  .pay h3{font-family:var(--serif);font-weight:600;font-size:1.2rem;margin-bottom:.2rem}
  .pay .hint{color:var(--soft);font-size:.85rem;margin-bottom:1rem}
  .field{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem}
  .field label{font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
  .field input,.field select{font-family:var(--sans);font-size:1rem;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:.65rem .8rem}
  .err{color:var(--accent);font-size:.85rem;margin-top:.3rem}
  /* result */
  .receipt{margin-top:1.3rem;background:#fff;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:1.2rem 1.3rem}
  .receipt .ref{font-family:var(--serif);font-size:1.5rem;font-weight:600;color:var(--accent);letter-spacing:.02em}
  .receipt .line{display:flex;justify-content:space-between;gap:1rem;padding:.4rem 0;border-bottom:1px solid var(--line);font-size:.95rem}
  .receipt .line:last-of-type{border-bottom:0}
  .receipt .k{color:var(--soft)}
  .receipt .note{margin-top:.9rem;color:var(--soft);font-size:.82rem;line-height:1.5}
  .pill{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#7a5b12;background:#F3E2B6;border-radius:999px;padding:.18rem .6rem;margin-bottom:.6rem}
  .state{padding:3rem .25rem;color:var(--soft);font-style:italic}
  .federation{margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--line)}
  .fed-label{font-size:.7rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);margin-bottom:.8rem}
  .fed-link{display:flex;align-items:center;gap:.5rem;padding:.7rem .9rem;margin-bottom:.5rem;background:var(--card);border:1px solid var(--line);border-radius:10px;text-decoration:none;font-size:.92rem;font-weight:500;color:var(--ink)}
  .fed-link:hover{border-color:var(--accent);color:var(--accent)}
  .fed-link::before{content:"\\2192";color:var(--accent);font-weight:600}
  footer{padding:2.5rem 0;margin-top:2rem;border-top:1px solid var(--line);color:var(--soft);font-size:.82rem}
</style>
</head>
<body>
<header class="bar"><div class="bar-row">
  <span class="mark">BRASA CR</span>
  <button class="back" onclick="goBack()">\u2190 Back</button>
</div></header>

<div class="wrap">
  <div id="content"><p class="state">Loading school\u2026</p></div>
  <footer id="foot"></footer>
</div>

<script>
function goBack(){ if(history.length>1){history.back();} else {location.href='schools.html';} }
const GOV_BASE = "https://brasagovernment.net";
const esc = s => String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const colon = n => "\u20A1" + Number(n).toLocaleString("es-CR");
const params = new URLSearchParams(location.search);
const slug = (params.get("slug") || "").trim();
let SCHOOL = null;

function fact(k, v){ return v ? '<div class="fact"><div class="fact-k">'+esc(k)+'</div><div class="fact-v">'+esc(v)+'</div></div>' : ''; }

(async function(){
  const c = document.getElementById("content");
  if(!slug){ c.innerHTML = '<p class="state">No school specified.</p>'; return; }
  try{
    const res = await fetch("/api/school?slug=" + encodeURIComponent(slug));
    if(res.status === 404){ c.innerHTML = '<p class="state">School not found.</p>'; return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    const s = await res.json();
    if(s.error) throw new Error(s.error);
    SCHOOL = s;
    const province = s.province || "Other regions";
    document.title = s.name + " \u00B7 BRASA";
    const subBits = [s.type, s.canton, province].filter(Boolean).join(" \u00B7 ");
    const hasDest = !!(s.sinpe_movil || s.sinpe_account);

    const payArea = hasDest
      ? '<button class="btn btn-primary" id="payBtn">Pay this school</button>'
      : '<span class="btn btn-soon" title="No SINPE destination registered yet">Online payment \u2014 not yet available</span>';

    c.innerHTML =
      '<section class="lead">' +
        '<p class="eyebrow">' + esc(s.type || "Centro Educativo") + '</p>' +
        '<h1>' + esc(s.name) + '</h1>' +
        '<p class="sub">' + esc(subBits) + '</p>' +
      '</section>' +
      '<section class="facts">' +
        fact("Type", s.type) + fact("Cant\u00F3n", s.canton) + fact("Province", province) +
        fact("DRE region", s.dre) + fact("MEP code", s.codigo_mep) +
        fact("C\u00E9dula jur\u00EDdica", s.cedula_juridica) + fact("Registry ID", s.slug) +
      '</section>' +
      (s.tagline ? '<p class="quote">\u201C' + esc(s.tagline) + '\u201D</p>' : '') +
      '<section class="actions">' +
        '<a class="btn btn-ghost" href="schools.html?province=' + encodeURIComponent(s.province ? s.province : "Others") + '">\u2190 All schools in ' + esc(province) + '</a>' +
        payArea +
      '</section>' +
      '<div id="payMount"></div>' +
      '<section class="federation">' +
        '<p class="fed-label">Federation \u00B7 one school, two doors</p>' +
        (s.dre ? '<a class="fed-link" href="schools.html?dre=' + encodeURIComponent(s.dre) + '">Government \u00B7 DRE ' + esc(s.dre) + ' \u2014 all schools</a>' : '') +
        '<a class="fed-link" href="schools.html?province=' + encodeURIComponent(s.province ? s.province : "Others") + '">Education \u00B7 ' + esc(province) + ' province</a>' +
        '<a class="fed-link" href="' + GOV_BASE + '" target="_blank" rel="noopener">BRASA Government \u00B7 Education sector</a>' +
      '</section>';

    document.getElementById("foot").textContent = "From the BRASA citizens registry \u00B7 " + (s.dre ? "DRE " + s.dre : "Schools of Costa Rica");
    if(hasDest) document.getElementById("payBtn").addEventListener("click", openPay);
  }catch(err){
    c.innerHTML = '<p class="state">Couldn\u2019t load this school (' + esc(err.message||err) + ').</p>';
  }
})();

function openPay(){
  const btn = document.getElementById("payBtn"); if(btn) btn.disabled = true;
  document.getElementById("payMount").innerHTML =
    '<section class="pay">' +
      '<h3>Pay ' + esc(SCHOOL.name) + '</h3>' +
      '<p class="hint">Payments run on SINPE. BRASA records the payment and issues your Hacienda receipt \u2014 it never holds the money.</p>' +
      '<div class="field"><label>Amount (colones)</label><input id="amt" type="number" min="1" step="100" placeholder="e.g. 5000" inputmode="numeric"></div>' +
      '<div class="field"><label>Purpose</label><select id="concept">' +
        ['Matr\u00EDcula','Comedor / Soda','Transporte','Materiales','Donaci\u00F3n','Otro'].map(o=>'<option>'+o+'</option>').join('') +
      '</select></div>' +
      '<button class="btn btn-primary" id="genBtn">Generate payment</button>' +
      '<div class="err" id="payErr"></div>' +
    '</section><div id="receiptMount"></div>';
  document.getElementById("genBtn").addEventListener("click", generate);
}

async function generate(){
  const amt = Number(document.getElementById("amt").value);
  const concept = document.getElementById("concept").value;
  const err = document.getElementById("payErr");
  err.textContent = "";
  if(!(amt > 0)){ err.textContent = "Enter an amount greater than zero."; return; }
  const gen = document.getElementById("genBtn"); gen.disabled = true; gen.textContent = "Generating\u2026";
  try{
    const res = await fetch("/api/pay", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ slug: SCHOOL.slug, amount: amt, concept }) });
    const d = await res.json();
    if(d.available === false){ err.textContent = d.message || "Payment not available for this school yet."; gen.disabled=false; gen.textContent="Generate payment"; return; }
    if(!res.ok || d.error) throw new Error(d.error || ("HTTP " + res.status));
    document.getElementById("receiptMount").innerHTML =
      '<section class="receipt">' +
        '<span class="pill">Pending</span>' +
        '<div class="ref">' + esc(d.reference) + '</div>' +
        '<div class="line"><span class="k">Pay to</span><span>' + esc(d.payee) + '</span></div>' +
        '<div class="line"><span class="k">SINPE destination</span><span>' + esc(d.destination) + '</span></div>' +
        (d.cedula ? '<div class="line"><span class="k">C\u00E9dula jur\u00EDdica</span><span>' + esc(d.cedula) + '</span></div>' : '') +
        '<div class="line"><span class="k">Amount</span><span>' + colon(d.amount) + '</span></div>' +
        '<div class="line"><span class="k">Purpose</span><span>' + esc(d.concept) + '</span></div>' +
        '<p class="note">Send ' + colon(d.amount) + ' by SINPE M\u00F3vil to <strong>' + esc(d.destination) + '</strong> and put the reference <strong>' + esc(d.reference) + '</strong> in the note. ' +
        'The funds move bank-to-bank over SINPE; BRASA records this payment and issues the Hacienda tiquete electr\u00F3nico. BRASA never holds or settles the money.</p>' +
      '</section>';
    document.getElementById("receiptMount").scrollIntoView({behavior:"smooth", block:"nearest"});
  }catch(e){
    err.textContent = "Couldn\u2019t generate payment (" + (e.message||e) + ").";
    gen.disabled = false; gen.textContent = "Generate payment";
  }
}
</script>
</body>
</html>
