<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Schools by DRE region · BRASA Government</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F0EBDE;--ink:#1B1A17;--soft:#6B6658;--accent:#8C3A1F;--line:#D9D2C4;--card:#FBF8F1;--serif:'Fraunces',Georgia,serif;--sans:'Geist',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1100px;margin:0 auto;padding:0 clamp(1.25rem,4vw,3rem)}
  header.bar{position:sticky;top:0;z-index:10;background:rgba(240,235,222,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar-row{display:flex;align-items:center;justify-content:space-between;padding:1rem 0}
  .mark{font-family:var(--serif);font-weight:600;font-size:1.35rem;color:var(--accent)}
  .back{font-family:var(--sans);font-size:.85rem;font-weight:500;color:var(--soft);text-decoration:none}
  .back:hover{color:var(--ink)}
  .hero{padding:clamp(2.25rem,5vw,3.5rem) 0 1.5rem;border-bottom:1px solid var(--line)}
  .eyebrow{font-family:var(--sans);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(2rem,5vw,3.2rem);line-height:1.05;letter-spacing:-.01em;color:var(--ink)}
  .count{margin-top:.6rem;color:var(--soft);font-size:.95rem}
  main{padding:2rem 0 5rem}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
  @media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .tile{display:flex;flex-direction:column;gap:.4rem;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.2rem 1.25rem;text-decoration:none;color:inherit}
  .tile:hover{border-color:var(--accent)}
  .tile-eyebrow{font-family:var(--sans);font-size:.66rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--soft)}
  .tile-name{font-family:var(--serif);font-weight:500;font-size:1.25rem;line-height:1.15;color:var(--ink)}
  .tile-count{color:var(--accent);font-size:.85rem;font-weight:600;margin-top:.1rem}
  .state{padding:3rem .25rem;color:var(--soft);font-style:italic}
  footer{padding:2.5rem 0;border-top:1px solid var(--line);color:var(--soft);font-size:.82rem}
</style>
</head>
<body>
<header class="bar"><div class="wrap bar-row">
  <span class="mark">BRASA Government</span>
  <a class="back" href="index.html">\u2190 Governments, World Wide</a>
</div></header>

<div class="wrap">
  <section class="hero">
    <p class="eyebrow">Education System \u00B7 Sector V</p>
    <h1>Schools by DRE region</h1>
    <p class="count" id="count">Loading\u2026</p>
  </section>
  <main id="main"><p class="state">Loading regions\u2026</p></main>
  <footer>Live from the BRASA citizens registry \u00B7 27 Direcciones Regionales de Educaci\u00F3n</footer>
</div>

<script>
const esc = s => String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
(async function(){
  try{
    const res = await fetch("/api/regions");
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    const regions = data.regions || [];
    const total = regions.reduce((n,r)=>n + (r.count||0), 0);
    document.getElementById("count").textContent =
      total.toLocaleString() + " schools \u00B7 " + regions.length + " DRE regions";
    document.getElementById("main").innerHTML =
      '<div class="grid">' + regions.map(r =>
        '<a class="tile" href="schools.html?dre=' + encodeURIComponent(r.dre) + '">' +
          '<span class="tile-eyebrow">DRE' + (r.province ? " \u00B7 " + esc(r.province) : "") + '</span>' +
          '<span class="tile-name">' + esc(r.dre) + '</span>' +
          '<span class="tile-count">' + (r.count||0).toLocaleString() + ' schools</span>' +
        '</a>'
      ).join("") + '</div>';
  }catch(err){
    document.getElementById("count").textContent = "";
    document.getElementById("main").innerHTML = '<p class="state">Couldn\u2019t load regions (' + esc(err.message||err) + ').</p>';
  }
})();
</script>
</body>
</html>
